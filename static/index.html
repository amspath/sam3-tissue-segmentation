<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSI Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1.0/build/openseadragon/openseadragon.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1c1c1e;
      color: #e0e0e0;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      background: #242426;
      border-right: 1px solid #3a3a3c;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 12px 12px 8px;
      border-bottom: 1px solid #3a3a3c;
      flex-shrink: 0;
    }

    #sidebar-header h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 8px;
    }

    #path-bar {
      display: flex;
      gap: 6px;
    }

    #path-input {
      flex: 1;
      background: #1c1c1e;
      border: 1px solid #3a3a3c;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 5px 8px;
      font-size: 12px;
      outline: none;
      min-width: 0;
    }

    #path-input:focus { border-color: #0a84ff; }

    #go-btn {
      background: #0a84ff;
      border: none;
      border-radius: 6px;
      color: #fff;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #go-btn:hover { background: #248aff; }

    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    #file-tree::-webkit-scrollbar { width: 6px; }
    #file-tree::-webkit-scrollbar-track { background: transparent; }
    #file-tree::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      border-radius: 0;
      transition: background 0.1s;
    }

    .tree-item:hover { background: #2e2e30; }
    .tree-item.selected { background: #0a84ff22; color: #0a84ff; }

    .tree-icon {
      flex-shrink: 0;
      width: 14px;
      text-align: center;
      font-size: 12px;
    }

    .tree-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-size {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 10px;
      color: #666;
      padding-left: 4px;
    }

    .tree-children {
      /* indent via padding on children */
    }

    .tree-children .tree-item {
      padding-left: calc(12px + var(--depth, 1) * 14px);
    }

    .tree-item.dir-open > .tree-icon::after { content: ""; }

    #sidebar-footer {
      padding: 8px 12px;
      border-top: 1px solid #3a3a3c;
      font-size: 11px;
      color: #666;
      flex-shrink: 0;
    }

    /* ── Main viewer ──────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    #viewer {
      flex: 1;
      background: #111;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 12px;
      background: #1c1c1e;
      border-top: 1px solid #3a3a3c;
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }

    #status-name { color: #ccc; font-weight: 500; }
    #status-dims { color: #888; }
    #status-zoom { color: #888; min-width: 60px; }
    #status-mpp  { color: #888; }

    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(17, 17, 17, 0.85);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #loading-overlay.visible { opacity: 1; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #0a84ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444;
      pointer-events: none;
      gap: 12px;
    }

    #empty-state svg { opacity: 0.3; }
    #empty-state p { font-size: 14px; }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────── -->
<div id="sidebar">
  <div id="sidebar-header">
    <h2>Slides</h2>
    <div id="path-bar">
      <input id="path-input" type="text" placeholder="Directory path…" />
      <button id="go-btn">Go</button>
    </div>
  </div>
  <div id="file-tree"></div>
  <div id="sidebar-footer">Click a slide file to open it</div>
</div>

<!-- ── Viewer ──────────────────────────────────────────── -->
<div id="main">
  <div id="viewer">
    <div id="empty-state">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="48" height="48" rx="4" stroke="#888" stroke-width="2"/>
        <circle cx="24" cy="24" r="6" stroke="#888" stroke-width="2"/>
        <path d="M8 42 L20 30 L30 40 L40 28 L56 48" stroke="#888" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
      <p>Select a slide from the sidebar</p>
    </div>
  </div>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <div id="status-bar">
    <span id="status-name">No slide loaded</span>
    <span id="status-dims"></span>
    <span id="status-zoom"></span>
    <span id="status-mpp"></span>
  </div>
</div>

<script>
"use strict";

// ── OpenSeadragon viewer ────────────────────────────────

const viewer = OpenSeadragon({
  id: "viewer",
  prefixUrl: "https://cdn.jsdelivr.net/npm/openseadragon@4.1.0/build/openseadragon/images/",
  showNavigator: true,
  navigatorPosition: "TOP_RIGHT",
  navigatorSizeRatio: 0.15,
  animationTime: 0.25,
  blendTime: 0.08,
  constrainDuringPan: false,
  maxZoomPixelRatio: 4,
  minZoomImageRatio: 0.5,
  visibilityRatio: 0.3,
  zoomPerScroll: 1.4,
  zoomPerClick: 1.0,      // disable click-to-zoom (microscope feel)
  imageLoaderLimit: 8,
  timeout: 15000,
  immediateRender: false,
  gestureSettingsMouse: { clickToZoom: false },
  gestureSettingsTouch: { clickToZoom: false },
});

// ── State ───────────────────────────────────────────────

let currentSlideId = null;
let currentSlideName = "";

// ── Status bar ──────────────────────────────────────────

viewer.addHandler("zoom", ({ zoom }) => {
  document.getElementById("status-zoom").textContent =
    `${(zoom * 100).toFixed(0)}%`;
});

viewer.addHandler("open-failed", (e) => {
  console.error("Open failed", e);
  setLoading(false);
  document.getElementById("status-name").textContent = "Failed to open slide";
});

viewer.addHandler("open", () => {
  setLoading(false);
  document.getElementById("empty-state").style.display = "none";
});

function setLoading(on) {
  document.getElementById("loading-overlay").classList.toggle("visible", on);
}

// ── File tree ───────────────────────────────────────────

const fileTree = document.getElementById("file-tree");
const pathInput = document.getElementById("path-input");

async function browse(path, container, depth = 0) {
  container.innerHTML = '<div style="padding:8px 12px;color:#666;font-size:11px;">Loading…</div>';
  let data;
  try {
    const url = path ? `/api/browse?path=${encodeURIComponent(path)}` : "/api/browse";
    const res = await fetch(url);
    if (!res.ok) throw new Error(await res.text());
    data = await res.json();
  } catch (err) {
    container.innerHTML = `<div style="padding:8px 12px;color:#e05252;font-size:11px;">Error: ${err.message}</div>`;
    return;
  }

  pathInput.value = data.path;
  container.innerHTML = "";

  if (data.entries.length === 0) {
    container.innerHTML = '<div style="padding:8px 12px;color:#555;font-size:11px;">Empty directory</div>';
    return;
  }

  for (const entry of data.entries) {
    const row = document.createElement("div");
    row.className = "tree-item " + entry.type;
    row.style.setProperty("--depth", depth);
    row.dataset.path = entry.path;
    if (entry.slide_id) row.dataset.slideId = entry.slide_id;

    const icon = document.createElement("span");
    icon.className = "tree-icon";
    icon.textContent = entry.type === "dir" ? "📁" : "🔬";

    const label = document.createElement("span");
    label.className = "tree-label";
    label.textContent = entry.name;
    label.title = entry.path;

    row.appendChild(icon);
    row.appendChild(label);

    if (entry.type === "file" && entry.size != null) {
      const sz = document.createElement("span");
      sz.className = "tree-size";
      sz.textContent = formatSize(entry.size);
      row.appendChild(sz);
    }

    if (entry.type === "dir") {
      let expanded = false;
      let childDiv = null;

      row.addEventListener("click", async (e) => {
        e.stopPropagation();
        if (expanded) {
          // Collapse
          if (childDiv) { childDiv.remove(); childDiv = null; }
          icon.textContent = "📁";
          expanded = false;
        } else {
          // Expand
          icon.textContent = "📂";
          expanded = true;
          childDiv = document.createElement("div");
          childDiv.className = "tree-children";
          row.after(childDiv);
          await browse(entry.path, childDiv, depth + 1);
        }
      });
    } else {
      row.addEventListener("click", () => loadSlide(entry.slide_id, entry.name, entry.path));
    }

    container.appendChild(row);
  }
}

function formatSize(bytes) {
  if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + " GB";
  if (bytes >= 1048576)    return (bytes / 1048576).toFixed(0) + " MB";
  if (bytes >= 1024)       return (bytes / 1024).toFixed(0) + " KB";
  return bytes + " B";
}

// ── Load slide ──────────────────────────────────────────

async function loadSlide(slideId, name, path) {
  if (slideId === currentSlideId) return;
  currentSlideId = slideId;
  currentSlideName = name;

  // Highlight selection
  document.querySelectorAll(".tree-item.file.selected").forEach(el => el.classList.remove("selected"));
  document.querySelectorAll(`.tree-item.file[data-slide-id="${CSS.escape(slideId)}"]`).forEach(el => el.classList.add("selected"));

  // Update status bar
  document.getElementById("status-name").textContent = name;
  document.getElementById("status-dims").textContent = "";
  document.getElementById("status-zoom").textContent = "";
  document.getElementById("status-mpp").textContent = "";
  setLoading(true);
  document.getElementById("empty-state").style.display = "none";

  // Fetch slide info for metadata display
  fetch(`/api/slides/${slideId}/info`).then(r => r.json()).then(info => {
    document.getElementById("status-dims").textContent =
      `${info.width.toLocaleString()} × ${info.height.toLocaleString()} px`;
    if (info.mpp_x) {
      document.getElementById("status-mpp").textContent =
        `${info.mpp_x.toFixed(3)} µm/px`;
    }
  }).catch(() => {});

  // Open DZI source in OpenSeadragon
  viewer.open(`/api/slides/${slideId}.dzi`);
}

// ── Controls ────────────────────────────────────────────

document.getElementById("go-btn").addEventListener("click", () => {
  browse(pathInput.value.trim(), fileTree, 0);
});

pathInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") browse(pathInput.value.trim(), fileTree, 0);
});

// ── Init: browse default directory ──────────────────────

browse("", fileTree, 0);
</script>
</body>
</html>
